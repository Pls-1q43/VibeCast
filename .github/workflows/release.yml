name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if [[ ! "$TAG" =~ ^v[0-9]+[.][0-9]+[.][0-9]+ ]]; then
            echo "Release tag must look like vX.Y.Z; got $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Require release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          NOTES_FILE="docs/releases/$VERSION.md"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Missing release notes: $NOTES_FILE" >&2
            echo "Create this file before tagging a release." >&2
            exit 1
          fi
          if ! grep -Eq '[[:alnum:]]' "$NOTES_FILE"; then
            echo "Release notes must contain human-readable content: $NOTES_FILE" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Test web
        working-directory: web
        run: |
          NODE_OPTIONS="" npm test
          NODE_OPTIONS="" npm run typecheck
          npm audit --audit-level=high

      - name: Test mac
        working-directory: mac
        run: swift test

      - name: Build ad-hoc signed app archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: bash scripts/build_app.sh

      - name: Verify universal macOS app archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          CHECK_DIR="$RUNNER_TEMP/vibecast-universal-check"
          rm -rf "$CHECK_DIR"
          mkdir -p "$CHECK_DIR"
          ditto -x -k "dist/VibeCast-$VERSION-macos.zip" "$CHECK_DIR"
          APP_BIN="$CHECK_DIR/VibeCast.app/Contents/MacOS/VibeCast"
          lipo "$APP_BIN" -verify_arch arm64
          lipo "$APP_BIN" -verify_arch x86_64
          lipo -archs "$APP_BIN"

      - name: Download Sparkle tools
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sparkle"
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/2.9.3/Sparkle-2.9.3.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          echo "SPARKLE_GENERATE_APPCAST=$(find "$RUNNER_TEMP/sparkle" -path '*/bin/generate_appcast' -type f | head -n 1)" >> "$GITHUB_ENV"

      - name: Generate Sparkle appcast
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$SPARKLE_PRIVATE_ED_KEY" ]; then
            echo "Missing SPARKLE_PRIVATE_ED_KEY secret" >&2
            exit 1
          fi
          mkdir -p public
          cp "dist/VibeCast-$VERSION-macos.zip" public/
          cp "docs/releases/$VERSION.md" "public/VibeCast-$VERSION-macos.md"
          echo "$SPARKLE_PRIVATE_ED_KEY" | "$SPARKLE_GENERATE_APPCAST" \
            --ed-key-file - \
            --maximum-deltas 0 \
            --download-url-prefix "https://github.com/Pls-1q43/VibeCast/releases/download/$TAG/" \
            --release-notes-url-prefix "https://pls-1q43.github.io/VibeCast/" \
            -o public/appcast.xml \
            public
          rm -f "public/VibeCast-$VERSION-macos.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          ASSET="dist/VibeCast-$VERSION-macos.zip#VibeCast $VERSION for macOS"
          NOTES_FILE="docs/releases/$VERSION.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
            gh release edit "$TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" "$ASSET" \
              --verify-tag \
              --title "VibeCast $VERSION" \
              --notes-file "$NOTES_FILE"
          fi

      - name: Publish appcast to GitHub Pages branch
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          PAGES_DIR="$RUNNER_TEMP/gh-pages"
          rm -rf "$PAGES_DIR"
          mkdir -p "$PAGES_DIR"
          cp -R public/. "$PAGES_DIR/"

          git -C "$PAGES_DIR" init
          git -C "$PAGES_DIR" checkout -b gh-pages
          git -C "$PAGES_DIR" config user.name "github-actions[bot]"
          git -C "$PAGES_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$PAGES_DIR" add .
          git -C "$PAGES_DIR" commit -m "Deploy appcast for $TAG"
          git -C "$PAGES_DIR" push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
